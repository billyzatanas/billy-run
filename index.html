<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Billy Web3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }body { font-family: Arial, sans-serif; background: radial-gradient(circle at top, #0b0f1a, #000); color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; }

.header { width: 100%; padding: 10px; display: flex; justify-content: space-between; font-size: 14px; opacity: 0.9; }

.center { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }

.billy { width: 120px; height: 120px; background: linear-gradient(45deg, #00ffcc, #ff00ff); border-radius: 50%; box-shadow: 0 0 30px #00ffcc; animation: float 3s ease-in-out infinite; cursor: pointer; }

@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.particles { position: absolute; width: 100%; height: 100%; pointer-events: none; }

.footer { width: 100%; padding: 10px; display: flex; justify-content: space-around; }

button { padding: 12px 16px; border: none; border-radius: 10px; background: #111; color: #fff; box-shadow: 0 0 10px rgba(0,255,200,0.5); font-size: 14px; }

button:active { transform: scale(0.95); }

.score { font-size: 18px; font-weight: bold; } </style>

</head>
<body><div class="header">
  <div>Level <span id="level">1</span></div>
  <div class="score">Coins: <span id="score">0</span></div>
  <div>x<span id="multiplier">1</span></div>
</div><div class="center">
  <div class="billy" onclick="tap()"></div>
</div><div class="footer">
  <button onclick="upgrade()">Upgrade</button>
  <button onclick="saveScore()">Save</button>
  <button onclick="shareX()">Share on X</button>
</div><script>
let score = 0;
let multiplier = 1;
let level = 1;

function updateUI() {
  document.getElementById('score').innerText = score;
  document.getElementById('multiplier').innerText = multiplier;
  document.getElementById('level').innerText = level;
}

function tap() {
  score += multiplier;
  createParticle();
  updateUI();
}

function upgrade() {
  if (score >= 10) {
    score -= 10;
    multiplier++;
    level++;
    updateUI();
  }
}

function saveScore() {
  localStorage.setItem('billyScore', score);
  alert('Score saved!');
}

function shareX() {
  const text = encodeURIComponent("Billy is evolving. Tap, earn, and grow.");
  window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
}

function createParticle() {
  const particle = document.createElement('div');
  particle.style.position = 'absolute';
  particle.style.width = '8px';
  particle.style.height = '8px';
  particle.style.background = '#00ffcc';
  particle.style.borderRadius = '50%';
  particle.style.left = Math.random() * 100 + '%';
  particle.style.top = '50%';
  particle.style.opacity = 1;

  document.body.appendChild(particle);

  let move = 0;
  const interval = setInterval(() => {
    move += 2;
    particle.style.transform = `translateY(-${move}px)`;
    particle.style.opacity -= 0.02;

    if (particle.style.opacity <= 0) {
      clearInterval(interval);
      particle.remove();
    }
  }, 16);
}

// Load saved score
window.onload = () => {
  const saved = localStorage.getItem('billyScore');
  if (saved) {
    score = parseInt(saved);
    updateUI();
  }
};
</script></body>
</html>
