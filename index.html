<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billy Tap 🐱</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(#0f172a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      flex-direction: column;
    }
    canvas {
      background: #1e293b;
      border-radius: 20px;
    }
    #score {
      margin-bottom: 10px;
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div id="score">Coins: 0</div>
  <canvas id="gameCanvas" width="350" height="500"></canvas>  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let coins = 0;

    // Billy (circle placeholder for now)
    let billy = {
      x: 175,
      y: 250,
      radius: 40,
      scale: 1
    };

    function drawBilly() {
      ctx.save();
      ctx.translate(billy.x, billy.y);
      ctx.scale(billy.scale, billy.scale);

      // body
      ctx.beginPath();
      ctx.arc(0, 0, billy.radius, 0, Math.PI * 2);
      ctx.fillStyle = "#facc15";
      ctx.fill();

      // eyes
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.arc(-10, -5, 5, 0, Math.PI * 2);
      ctx.arc(10, -5, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawCoinEffect(x, y) {
      ctx.fillStyle = "#22c55e";
      ctx.font = "16px Arial";
      ctx.fillText("+1", x, y);
    }

    let effects = [];

    function updateEffects() {
      effects.forEach(e => {
        e.y -= 1;
        e.life--;
      });
      effects = effects.filter(e => e.life > 0);
    }

    function drawEffects() {
      effects.forEach(e => {
        drawCoinEffect(e.x, e.y);
      });
    }

    function animateTap() {
      billy.scale = 1.2;
      setTimeout(() => {
        billy.scale = 1;
      }, 100);
    }

    canvas.addEventListener("click", (e) => {
      coins++;
      document.getElementById("score").innerText = "Coins: " + coins;

      animateTap();

      effects.push({
        x: billy.x - 10,
        y: billy.y,
        life: 30
      });
    });

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBilly();
      updateEffects();
      drawEffects();

      requestAnimationFrame(loop);
    }

    loop();
  </script></body>
</html>
