<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Billy Tap PRO 🐱</title>
<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #1e293b, #020617);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#fff;
  font-family:Arial;
  overflow:hidden;
}canvas{ background: linear-gradient(145deg, #1e293b, #0f172a); border-radius:20px; width:90vw; max-width:420px; height:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }

#score{font-size:20px} #info{font-size:13px;opacity:.8} #energyBar{ width:70vw; max-width:200px; height:10px; background:#334155; border-radius:10px; margin:6px 0; overflow:hidden; } #energyFill{height:100%;background:#22c55e;width:100%}

button{ margin-top:6px; padding:8px 12px; border-radius:10px; border:none; cursor:pointer; }

#leaderboard{ margin-top:10px; font-size:12px; text-align:left; width:70vw; max-width:200px; } </style>

</head>
<body><div id="score">Coins: 0</div>
<div id="info">Level 1 • x1</div>
<div id="energyBar"><div id="energyFill"></div></div><canvas id="gameCanvas" width="350" height="500"></canvas>

<button id="upgradeTap">Upgrade Tap</button> <button id="saveScore">Save Score</button> <button id="shareBtn">Share on X</button>

<div id="leaderboard"></div><audio id="tap1" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio> <audio id="tap2" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let coins=0,level=1,multiplier=1;
let tapPower=1;
let energy=100,maxEnergy=100;

const billyImg=new Image();
billyImg.src="billy.gif";

let billy={x:175,y:250,size:90,scale:1};
let effects=[];
let t=0;

function drawBilly(){
 ctx.save();
 ctx.translate(billy.x,billy.y);
 ctx.scale(billy.scale,billy.scale);

 ctx.shadowColor="#22c55e";
 ctx.shadowBlur=25;

 ctx.beginPath();
 ctx.arc(0,0,billy.size/2,0,Math.PI*2);
 ctx.clip();

 ctx.drawImage(billyImg,-billy.size/2,-billy.size/2,billy.size,billy.size);
 ctx.restore();
}

function drawEffects(){
 ctx.fillStyle="#22c55e";
 ctx.font="bold 14px Arial";
 ctx.shadowBlur=0;
 effects.forEach(e=>ctx.fillText(`+${e.value}`,e.x,e.y));
}

function updateEffects(){
 effects.forEach(e=>{e.y-=1;e.life--});
 effects=effects.filter(e=>e.life>0);
}

function animateTap(){
 billy.scale=1.25;
 setTimeout(()=>billy.scale=1,60);
}

function updateUI(){
 document.getElementById("score").innerText="Coins: "+coins;
 document.getElementById("info").innerText=`Level ${level} • x${multiplier}`;
 document.getElementById("energyFill").style.width=(energy/maxEnergy*100)+"%";
}

function updateLevel(){
 level=Math.floor(coins/100)+1;
 multiplier=1+Math.floor(level/2);
}

canvas.addEventListener("click",()=>{
 if(energy<=0)return;
 let gain=tapPower*multiplier;
 coins+=gain;
 energy-=1;

 updateLevel();
 updateUI();
 animateTap();

 let s=Math.random()>0.5?tap1:tap2;
 s.currentTime=0;
 s.play();

 if(navigator.vibrate) navigator.vibrate(10);

 effects.push({x:billy.x-10,y:billy.y,life:30,value:gain});
});

setInterval(()=>{
 energy=Math.min(maxEnergy,energy+1);
 updateUI();
},100);

// upgrade
 document.getElementById("upgradeTap").onclick=()=>{
 let cost=50*tapPower;
 if(coins>=cost){coins-=cost;tapPower++;updateUI();}
 }

// leaderboard local
function getScores(){return JSON.parse(localStorage.getItem("billyScores")||"[]");}
function saveScore(){
 let scores=getScores();
 scores.push(coins);
 scores.sort((a,b)=>b-a);
 scores=scores.slice(0,5);
 localStorage.setItem("billyScores",JSON.stringify(scores));
 renderLeaderboard();
}
function renderLeaderboard(){
 let scores=getScores();
 let html="<b>Top Players</b><br>";
 scores.forEach((s,i)=>{html+=`#${i+1} - ${s} coins<br>`});
 document.getElementById("leaderboard").innerHTML=html;
}

document.getElementById("saveScore").onclick=saveScore;

// share pro
 document.getElementById("shareBtn").onclick=()=>{
 const text=`Just hit ${coins} coins on Billy Tap 🐱💰\nStill early… can you beat me?`;
 window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,'_blank');
 }

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 t+=0.05;
 billy.scale=1+Math.sin(t)*0.05;
 drawBilly();
 updateEffects();
 drawEffects();
 requestAnimationFrame(loop);
}

updateUI();
renderLeaderboard();
loop();
</script></body>
</html>
