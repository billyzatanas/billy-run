<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>BILLY EL GATO - Solana Edition 😺✨</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
  background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 50%, #0a0f2a 100%);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  touch-action: none; /* Mejor para seguir el dedo */
}

/* Estrellas animadas */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* Panel superior */
.top-panel {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  z-index: 20;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid rgba(251,191,36,0.3);
}

.stat {
  background: rgba(0,0,0,0.6);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  color: #ffd700;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* Panel de tokens */
.token-bar {
  position: fixed;
  top: 70px;
  left: 15px;
  right: 15px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  border-radius: 30px;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
  z-index: 20;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.5);
}

.token-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: bold;
  color: #000;
}

.token-amount {
  font-size: 20px;
  font-weight: bold;
  color: #000;
}

/* Barra de energía */
.energy-bar {
  position: fixed;
  bottom: 100px;
  left: 15px;
  right: 15px;
  z-index: 20;
  background: rgba(0,0,0,0.5);
  border-radius: 20px;
  padding: 5px 10px;
  backdrop-filter: blur(5px);
}

.energy-bg {
  height: 12px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.energy-fill {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #fbbf24);
  border-radius: 10px;
  transition: width 0.2s;
  width: 100%;
}

/* Botones */
.action-buttons {
  position: fixed;
  bottom: 20px;
  left: 15px;
  right: 15px;
  display: flex;
  gap: 10px;
  z-index: 20;
}

.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 30px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  color: white;
  transition: transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.btn:active {
  transform: scale(0.95);
}

.btn-primary {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #000;
}

.btn-solana {
  background: linear-gradient(135deg, #14f195, #9945ff);
}

/* Panel de combo */
.combo-panel {
  position: fixed;
  top: 120px;
  right: 15px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  padding: 8px 15px;
  border-radius: 30px;
  font-size: 18px;
  font-weight: bold;
  color: #ff6600;
  z-index: 20;
  text-align: center;
}

/* Notificaciones */
.notification {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #000;
  padding: 12px 24px;
  border-radius: 50px;
  font-weight: bold;
  animation: slideDown 0.5s ease-out;
  z-index: 1000;
  white-space: nowrap;
  font-size: 14px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

@keyframes slideDown {
  0% { top: -20%; opacity: 0; transform: translateX(-50%) scale(0.8); }
  100% { top: 40%; opacity: 1; transform: translateX(-50%) scale(1); }
}

/* Números flotantes */
.floating-number {
  position: fixed;
  pointer-events: none;
  font-weight: bold;
  font-size: 24px;
  text-shadow: 0 0 5px rgba(0,0,0,0.5);
  animation: floatUp 1s ease-out forwards;
  z-index: 100;
}

@keyframes floatUp {
  0% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateY(-80px) scale(1.2);
  }
}

/* Indicador de toque */
.touch-ripple {
  position: fixed;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(251,191,36,0.8) 0%, rgba(251,191,36,0) 70%);
  pointer-events: none;
  animation: rippleExpand 0.6s ease-out forwards;
  z-index: 50;
}

@keyframes rippleExpand {
  0% {
    transform: scale(0);
    opacity: 0.8;
  }
  100% {
    transform: scale(4);
    opacity: 0;
  }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="top-panel">
  <div class="stat">😺 Nivel <span id="level">1</span></div>
  <div class="stat">💰 <span id="coins">0</span></div>
  <div class="stat">⚡ x<span id="multiplier">1</span></div>
  <div class="stat">💪 <span id="tapPower">1</span></div>
</div>

<div class="token-bar" id="tokenBar">
  <div class="token-label">
    <span>🐱 $BILLY</span>
    <span style="font-size: 10px;">Solana</span>
  </div>
  <div class="token-amount">
    <span id="billyTokens">0</span> BILLY
  </div>
</div>

<div class="combo-panel">
  🔥 <span id="combo">0</span> COMBO
</div>

<div class="energy-bar">
  <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px;">
    <span>⚡ Energía</span>
    <span><span id="energyCurrent">100</span>/<span id="energyMax">100</span></span>
  </div>
  <div class="energy-bg">
    <div class="energy-fill" id="energyFill"></div>
  </div>
</div>

<div class="action-buttons">
  <button class="btn" id="upgradeBtn">💪 Mejorar</button>
  <button class="btn btn-primary" id="lootBtn">🎁 Cofre</button>
  <button class="btn btn-solana" id="walletBtn">🔗 Wallet</button>
</div>

<script>
// ==================== SISTEMA DE SONIDO ====================
class BillySound {
  constructor() {
    this.enabled = true;
    this.context = null;
    this.initAudio();
  }
  
  initAudio() {
    try {
      this.context = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      console.log('Web Audio no soportado');
    }
  }
  
  playTap() {
    if (!this.enabled || !this.context) return;
    try {
      const osc = this.context.createOscillator();
      const gain = this.context.createGain();
      osc.connect(gain);
      gain.connect(this.context.destination);
      osc.frequency.value = 800;
      gain.gain.value = 0.15;
      osc.type = 'sine';
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.context.currentTime + 0.2);
      osc.stop(this.context.currentTime + 0.2);
    } catch(e) {}
  }
  
  playCrit() {
    if (!this.enabled || !this.context) return;
    try {
      const osc = this.context.createOscillator();
      const gain = this.context.createGain();
      osc.connect(gain);
      gain.connect(this.context.destination);
      osc.frequency.value = 1200;
      gain.gain.value = 0.2;
      osc.type = 'triangle';
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.context.currentTime + 0.3);
      osc.stop(this.context.currentTime + 0.3);
    } catch(e) {}
  }
  
  playLevelUp() {
    if (!this.enabled || !this.context) return;
    try {
      const now = this.context.currentTime;
      const osc = this.context.createOscillator();
      const gain = this.context.createGain();
      osc.connect(gain);
      gain.connect(this.context.destination);
      osc.frequency.value = 400;
      gain.gain.value = 0.2;
      osc.type = 'sawtooth';
      osc.start();
      osc.frequency.setValueAtTime(800, now + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.5);
      osc.stop(now + 0.5);
    } catch(e) {}
  }
  
  playCoin() {
    if (!this.enabled || !this.context) return;
    try {
      const osc = this.context.createOscillator();
      const gain = this.context.createGain();
      osc.connect(gain);
      gain.connect(this.context.destination);
      osc.frequency.value = 1000;
      gain.gain.value = 0.1;
      osc.type = 'sine';
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, this.context.currentTime + 0.15);
      osc.stop(this.context.currentTime + 0.15);
    } catch(e) {}
  }
  
  playMeow() {
    if (!this.enabled || !this.context) return;
    try {
      const now = this.context.currentTime;
      const osc = this.context.createOscillator();
      const gain = this.context.createGain();
      osc.connect(gain);
      gain.connect(this.context.destination);
      osc.frequency.value = 400;
      gain.gain.value = 0.2;
      osc.type = 'sine';
      osc.start();
      osc.frequency.setValueAtTime(600, now + 0.1);
      osc.frequency.setValueAtTime(300, now + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.4);
      osc.stop(now + 0.4);
    } catch(e) {}
  }
}

const sound = new BillySound();

// ==================== CARGAR IMÁGENES DE BILLY ====================
// IMPORTANTE: Reemplaza estas URLs con las rutas de tus imágenes PNG
// Si están en el mismo repositorio, usa: 'billy_Angry.png', etc.
const IMAGES = {
  angry: new Image(),
  happy: new Image(),
  sad: new Image(),
  coins: new Image()
};

// Cargar imágenes - Ajusta las rutas según donde estén tus archivos
// Si están en la misma carpeta que este HTML, usa:
IMAGES.angry.src = 'billy_Angry.png';
IMAGES.happy.src = 'billy_happy.png';
IMAGES.sad.src = 'billy_Triste.png';
IMAGES.coins.src = 'billy_coins.png';

// Estado actual de Billy
let currentBilly = IMAGES.happy;
let billyX = window.innerWidth / 2;
let billyY = window.innerHeight / 2;
let billySize = 120;
let billyScale = 1;
let billyRotation = 0;
let billyShake = 0;

// ==================== FUNCIÓN PARA RECORTAR FONDO NEGRO ====================
// Esta función toma una imagen y crea una versión con fondo transparente
function removeBlackBackground(img, callback) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  
  // Umbral para detectar negro (0-255)
  const threshold = 30;
  
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    // Si el pixel es muy oscuro, lo hacemos transparente
    if (r < threshold && g < threshold && b < threshold) {
      data[i + 3] = 0; // Alpha = 0 (transparente)
    }
  }
  
  ctx.putImageData(imageData, 0, 0);
  
  const newImg = new Image();
  newImg.onload = () => callback(newImg);
  newImg.src = canvas.toDataURL();
}

// Procesar imágenes para quitar fondo negro
// (Descomenta si quieres procesar automáticamente)
/*
Object.keys(IMAGES).forEach(key => {
  IMAGES[key].onload = () => {
    removeBlackBackground(IMAGES[key], (cleanImg) => {
      IMAGES[key] = cleanImg;
    });
  };
});
*/

// ==================== SISTEMA DE JUEGO ====================
let coins = 0;
let level = 1;
let multiplier = 1;
let tapPower = 1;
let energy = 100;
let maxEnergy = 100;
let combo = 0;
let bestCombo = 0;
let comboTimer = null;
let billyTokens = 0;

// Elementos UI
function updateUI() {
  document.getElementById('level').innerText = level;
  document.getElementById('coins').innerText = Math.floor(coins);
  document.getElementById('multiplier').innerText = multiplier;
  document.getElementById('tapPower').innerText = tapPower;
  document.getElementById('combo').innerText = combo;
  document.getElementById('energyCurrent').innerText = Math.floor(energy);
  document.getElementById('energyFill').style.width = (energy / maxEnergy * 100) + '%';
  document.getElementById('billyTokens').innerText = Math.floor(billyTokens);
}

// Mostrar notificación
function showNotification(msg) {
  const div = document.createElement('div');
  div.className = 'notification';
  div.innerText = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2000);
}

// Mostrar número flotante
function showFloatingNumber(value, x, y, isCrit = false) {
  const div = document.createElement('div');
  div.className = 'floating-number';
  div.innerText = `+${Math.floor(value)}`;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  div.style.color = isCrit ? '#ffd700' : '#fff';
  div.style.fontSize = isCrit ? '28px' : '20px';
  div.style.fontWeight = 'bold';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1000);
}

// Efecto de toque
function createRipple(x, y) {
  const ripple = document.createElement('div');
  ripple.className = 'touch-ripple';
  ripple.style.left = (x - 30) + 'px';
  ripple.style.top = (y - 30) + 'px';
  ripple.style.width = '60px';
  ripple.style.height = '60px';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}

// Partículas (simple)
function createParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const particle = document.createElement('div');
    particle.style.position = 'fixed';
    particle.style.left = x + 'px';
    particle.style.top = y + 'px';
    particle.style.width = '4px';
    particle.style.height = '4px';
    particle.style.background = color;
    particle.style.borderRadius = '50%';
    particle.style.pointerEvents = 'none';
    particle.style.zIndex = '100';
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 4;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;
    let life = 30;
    document.body.appendChild(particle);
    
    const animate = () => {
      life--;
      if (life <= 0) {
        particle.remove();
        return;
      }
      const left = parseFloat(particle.style.left);
      const top = parseFloat(particle.style.top);
      particle.style.left = (left + vx) + 'px';
      particle.style.top = (top + vy) + 'px';
      particle.style.opacity = life / 30;
      requestAnimationFrame(animate);
    };
    animate();
  }
}

// Actualizar nivel
function updateLevel() {
  let needed = 150 * Math.pow(1.3, level - 1);
  if (coins >= needed) {
    level++;
    multiplier = 1 + Math.floor(level / 4);
    sound.playLevelUp();
    showNotification(`🎉 NIVEL ${level} DESBLOQUEADO! 🎉`);
    createParticles(billyX, billyY, '#ffd700');
    energy = Math.min(maxEnergy, energy + 20);
    updateUI();
  }
}

// Minar tokens BILLY
function mineTokens(amount) {
  let earned = Math.floor(amount / 8);
  if (earned > 0) {
    billyTokens += earned;
    updateUI();
  }
}

// Añadir combo
function addCombo() {
  combo++;
  if (combo > bestCombo) bestCombo = combo;
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => {
    if (combo >= 5) showNotification(`🔥 Combo de ${combo} terminado! 🔥`);
    combo = 0;
    updateUI();
  }, 2000);
  updateUI();
}

// Cambiar expresión de Billy
function setBillyExpression(expression, duration = 500) {
  if (expression === 'happy') currentBilly = IMAGES.happy;
  else if (expression === 'angry') currentBilly = IMAGES.angry;
  else if (expression === 'sad') currentBilly = IMAGES.sad;
  else if (expression === 'coins') currentBilly = IMAGES.coins;
  
  // Efecto de sacudida
  billyShake = 5;
  setTimeout(() => { billyShake = 0; }, 100);
  
  // Volver a feliz después del tiempo
  if (duration > 0) {
    setTimeout(() => {
      currentBilly = IMAGES.happy;
    }, duration);
  }
}

// TAP principal
function handleTap(x, y) {
  if (energy <= 0) {
    setBillyExpression('sad', 800);
    showNotification('💤 Billy está cansado! Espera un poco 💤');
    return;
  }
  
  addCombo();
  
  let critChance = Math.min(40, 15 + Math.floor(combo / 2));
  let isCrit = Math.random() * 100 < critChance;
  let gain = Math.floor(tapPower * multiplier * (isCrit ? 5 : 1) * (1 + combo * 0.04));
  
  coins += gain;
  energy -= Math.max(1, Math.floor(combo / 6));
  mineTokens(gain);
  
  updateUI();
  updateLevel();
  
  // Efectos visuales
  createRipple(x, y);
  createParticles(x, y, isCrit ? '#ffd700' : '#22c55e');
  showFloatingNumber(gain, x, y, isCrit);
  
  // Animación de escala
  billyScale = 1.2;
  setTimeout(() => { billyScale = 1; }, 100);
  
  // Sonidos y expresión
  if (isCrit) {
    sound.playCrit();
    setBillyExpression('coins', 400);
    showNotification(`⚡ CRÍTICO! x${Math.floor(1 + combo * 0.04)} ⚡`);
  } else {
    sound.playTap();
    if (combo > 5) setBillyExpression('happy', 200);
  }
  
  // Pequeño maullido ocasional
  if (Math.random() < 0.1) sound.playMeow();
}

// ==================== SEGUIMIENTO DEL DEDO/RATÓN ====================
let targetX = window.innerWidth / 2;
let targetY = window.innerHeight / 2;

function updateBillyPosition() {
  // Movimiento suave hacia el objetivo
  billyX += (targetX - billyX) * 0.12;
  billyY += (targetY - billyY) * 0.12;
  
  // Limitar bordes
  billyX = Math.min(Math.max(billyX, billySize / 2 + 10), window.innerWidth - billySize / 2 - 10);
  billyY = Math.min(Math.max(billyY, billySize / 2 + 60), window.innerHeight - billySize / 2 - 120);
  
  requestAnimationFrame(updateBillyPosition);
}
updateBillyPosition();

// Eventos de seguimiento
document.addEventListener('mousemove', (e) => {
  targetX = e.clientX;
  targetY = e.clientY;
});

document.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  targetX = touch.clientX;
  targetY = touch.clientY;
}, { passive: false });

document.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  targetX = touch.clientX;
  targetY = touch.clientY;
  handleTap(touch.clientX, touch.clientY);
}, { passive: false });

document.addEventListener('click', (e) => {
  handleTap(e.clientX, e.clientY);
});

// ==================== DIBUJAR BILLY ====================
function drawBilly() {
  const billy = document.getElementById('billyCharacter');
  if (!billy) {
    // Crear elemento si no existe
    const div = document.createElement('div');
    div.id = 'billyCharacter';
    div.style.position = 'fixed';
    div.style.width = billySize + 'px';
    div.style.height = billySize + 'px';
    div.style.pointerEvents = 'none';
    div.style.zIndex = '100';
    div.style.transition = 'transform 0.05s ease-out';
    document.body.appendChild(div);
    drawBilly();
    return;
  }
  
  // Dibujar imagen en canvas para mejor control de transparencia
  const canvas = document.createElement('canvas');
  canvas.width = billySize;
  canvas.height = billySize;
  const ctx = canvas.getContext('2d');
  
  // Aplicar sacudida
  let shakeX = billyShake ? (Math.random() - 0.5) * 8 : 0;
  let shakeY = billyShake ? (Math.random() - 0.5) * 8 : 0;
  
  ctx.save();
  ctx.translate(billySize / 2, billySize / 2);
  ctx.scale(billyScale, billyScale);
  ctx.rotate(billyRotation);
  
  if (currentBilly.complete && currentBilly.naturalWidth > 0) {
    ctx.drawImage(currentBilly, -billySize / 2, -billySize / 2, billySize, billySize);
  } else {
    // Fallback mientras cargan las imágenes
    ctx.fillStyle = '#FFA500';
    ctx.beginPath();
    ctx.arc(0, 0, billySize / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = `${billySize / 2}px Arial`;
    ctx.fillText('😺', -billySize / 3, billySize / 4);
  }
  
  ctx.restore();
  
  billy.style.left = (billyX - billySize / 2 + shakeX) + 'px';
  billy.style.top = (billyY - billySize / 2 + shakeY) + 'px';
  billy.style.backgroundImage = `url(${canvas.toDataURL()})`;
  billy.style.backgroundSize = 'cover';
  billy.style.backgroundRepeat = 'no-repeat';
  
  requestAnimationFrame(drawBilly);
}

// ==================== CREAR ESTRELLAS ====================
function createStars() {
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const star = document.createElement('div');
    star.style.position = 'absolute';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = Math.random() * 3 + 'px';
    star.style.height = star.style.width;
    star.style.background = 'white';
    star.style.borderRadius = '50%';
    star.style.opacity = 0.3 + Math.random() * 0.7;
    star.style.animation = `twinkle ${1 + Math.random() * 3}s infinite`;
    starsContainer.appendChild(star);
  }
}

// Estilo para las estrellas
const style = document.createElement('style');
style.textContent = `
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
`;
document.head.appendChild(style);
createStars();

// ==================== SISTEMA DE RECUPERACIÓN DE ENERGÍA ====================
setInterval(() => {
  let regen = Math.max(1, Math.floor(combo / 4));
  energy = Math.min(maxEnergy, energy + regen);
  updateUI();
}, 1000);

// ==================== EVENTOS DE BOTONES ====================
document.getElementById('upgradeBtn').onclick = () => {
  let cost = Math.floor(80 * Math.pow(1.5, tapPower - 1));
  if (coins >= cost) {
    coins -= cost;
    tapPower++;
    updateUI();
    setBillyExpression('happy', 400);
    createParticles(billyX, billyY, '#ffd700');
    sound.playLevelUp();
    showNotification(`💪 Poder aumentado a ${tapPower}!`);
  } else {
    showNotification(`💰 Necesitas ${Math.floor(cost)} monedas 💰`);
    setBillyExpression('sad', 300);
  }
};

document.getElementById('lootBtn').onclick = () => {
  if (coins >= 30) {
    coins -= 30;
    let reward = 80 + Math.floor(Math.random() * 150);
    coins += reward;
    updateUI();
    updateLevel();
    setBillyExpression('coins', 500);
    createParticles(billyX, billyY, '#ffd700');
    sound.playCrit();
    showNotification(`🎁 Cofre: +${reward} monedas! 🎁`);
  } else {
    showNotification(`💔 Necesitas 30 monedas 💔`);
    setBillyExpression('sad', 300);
  }
};

document.getElementById('walletBtn').onclick = () => {
  showNotification('🔗 Conexión a Solana Wallet - Próximamente en el lanzamiento de $BILLY! 🚀');
};

document.getElementById('tokenBar').onclick = () => {
  showNotification(`🐱 Tienes ${Math.floor(billyTokens)} $BILLY Tokens! Prepárate para el lanzamiento en Solana 🌟`);
};

// ==================== GUARDAR PROGRESO ====================
setInterval(() => {
  localStorage.setItem('billySave', JSON.stringify({
    coins: coins,
    level: level,
    tapPower: tapPower,
    billyTokens: billyTokens,
    bestCombo: bestCombo
  }));
}, 30000);

// Cargar progreso
const saved = localStorage.getItem('billySave');
if (saved) {
  const data = JSON.parse(saved);
  coins = data.coins || 0;
  level = data.level || 1;
  tapPower = data.tapPower || 1;
  billyTokens = data.billyTokens || 0;
  bestCombo = data.bestCombo || 0;
  multiplier = 1 + Math.floor(level / 4);
  updateUI();
}

// Iniciar dibujo
setTimeout(() => {
  drawBilly();
}, 100);

// Asegurar que las imágenes se carguen correctamente
Object.values(IMAGES).forEach(img => {
  img.onerror = () => {
    console.log('Imagen no encontrada, usando fallback');
  };
});

// Instrucciones para el usuario
setTimeout(() => {
  showNotification('🐱 Toca la pantalla o mueve el ratón para seguir a Billy!');
}, 1000);
</script>
</body>
</html>
